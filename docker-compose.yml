version: "3.9"

services:
  app:
    image: my_image:latest
    container_name: ros-container

    user: "ros"

    network_mode: "host"
    ipc: "host"

    stdin_open: true
    tty: true

    volumes:
      - ./my_code/src:/home/ros/dev_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    environment:
      - DISPLAY=${DISPLAY}